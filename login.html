<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="Wed, 11 Jan 1984 05:00:00 GMT">
    <title>Login - Skywings</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            backdrop-filter: blur(5px);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.35);
        }
    </style>
</head>

<body>

<a href="index.html" class="back-btn">
    <i class="fa-solid fa-arrow-left"></i> Back
</a>

<div class="auth-container">
    <div class="auth-box">
        <h2>Login</h2>

        <form action="login.php" method="post" autocomplete="off">
            <input type="email" name="email" id="email" placeholder="Email" required autocomplete="off">
            <input type="password" name="password" id="password" placeholder="Password" required autocomplete="off">
            <button type="submit">Login</button>
        </form>

        <p>Don't have an account? <a href="register.html">Create Account</a></p>
    </div>
</div>

<script>
    window.addEventListener("load", function() {
        localStorage.clear();
        sessionStorage.clear();
        document.getElementById("email").value = "";
        document.getElementById("password").value = "";
    });

    history.pushState(null, null, location.href);
    window.onpopstate = function() {
        history.go(1);
        localStorage.clear();
        sessionStorage.clear();
    };
</script>

</body>
</html>
