<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Register - Skywings</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.15);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            backdrop-filter: blur(5px);
        }

        .back-btn:hover { background: rgba(255,255,255,0.25); }

        .register-box {
            background: white;
            border-radius: 20px;
            padding: 40px 35px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .register-box .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-box .header .icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 28px;
            color: white;
        }

        .register-box .header h2 {
            color: #1e3c72;
            font-size: 24px;
        }

        .register-box .header p {
            color: #888;
            font-size: 13px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 14px 11px 38px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            background: #fafafa;
            transition: border 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2a5298;
            background: white;
        }

        .secret-note {
            background: #fff8e1;
            border: 1px solid #ffe082;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #795548;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .secret-note i { color: #f59e0b; }

        .submit-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: opacity 0.2s;
        }

        .submit-btn:hover { opacity: 0.9; }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }

        .login-link a { color: #2a5298; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>

<a href="login.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back</a>

<div class="register-box">
    <div class="header">
        <div class="icon"><i class="fa-solid fa-user-shield"></i></div>
        <h2>Admin Registration</h2>
        <p>Create a new admin account for Skywings</p>
    </div>

    <form action="admin_register.php" method="post">

        <div class="form-group">
            <label><i class="fa-solid fa-user"></i> Full Name</label>
            <div class="input-wrap">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="name" placeholder="Enter full name" required>
            </div>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <div class="input-wrap">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" name="email" placeholder="Enter email" required>
            </div>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <div class="input-wrap">
                <i class="fa-solid fa-phone"></i>
                <input type="text" name="phone" placeholder="+91-XXXXXXXXXX" required>
            </div>
        </div>

        <div class="form-group">
            <label>Airline Name</label>
            <div class="input-wrap">
                <i class="fa-solid fa-plane"></i>
                <input type="text" name="airline_name" placeholder="e.g. Skywings Airlines" required>
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password" placeholder="Create strong password" required>
            </div>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <div class="input-wrap">
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="confirm_password" placeholder="Re-enter password" required>
            </div>
        </div>

        

        <button type="submit" class="submit-btn">
            <i class="fa-solid fa-user-plus"></i> Create Admin Account
        </button>
    </form>

    <div class="login-link">
        Already have account? <a href="admin_login.html">Admin Login</a>
    </div>
</div>

</body>
</html>
